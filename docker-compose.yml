version: "3.9"

services:
  mongodb:
    image: mongo:latest
    container_name: verath-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verath-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/app
    command: python backend/run.py

volumes:
  mongodb_data:
