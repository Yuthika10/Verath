<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verath | Sign In</title>
  <meta name="description" content="Sign in to Verath - Your AI memory companion">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-layout">
    <!-- Left brand panel -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-logo">
          <div class="logo-mark-lg">V</div>
          <span class="brand-name">Verath</span>
        </div>
        <h1 class="brand-headline">Your memories,<br>always within reach.</h1>
        <p class="brand-sub">The AI-powered memory layer that records, indexes, and retrieves everything you've said, heard, and thought.</p>
        <div class="brand-stats" id="brand-stats">
          <div class="stat-pill">
            <span class="stat-dot"></span>
            <span>System Online</span>
          </div>
        </div>
      </div>
      <!-- Animated background grid -->
      <div class="brand-grid" aria-hidden="true"></div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
      <div class="auth-form-container">
        <!-- Toggle -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="showLogin()">Sign in</button>
          <button class="auth-tab" id="tab-register" onclick="showRegister()">Create account</button>
        </div>

        <!-- Login form -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="input" name="username" placeholder="your_username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="input" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Sign in <i class="fa-solid fa-arrow-right"></i>
          </button>
          <p class="auth-error" id="login-error"></p>
        </form>

        <!-- Register form -->
        <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Choose a username</label>
            <input type="text" class="input" name="username" placeholder="your_username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="input" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            Create account <i class="fa-solid fa-arrow-right"></i>
          </button>
          <p class="auth-error" id="register-error"></p>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
